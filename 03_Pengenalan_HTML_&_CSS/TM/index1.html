<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pengkonversi Gaya Teks</title>

    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">
    <h1>Pengkonversi Gaya Teks</h1>
    <p>Alat ini bisa mengubah teks menjadi huruf besar, huruf kecil, dan paragraf.</p>

    <label>Masukkan teks:</label><br>
    <textarea id="textInput" placeholder="Kata-kata..."></textarea>

    <p>
        Huruf: <span id="Total">0</span>, 
        Huruf besar: <span id="Upper">0</span>, 
        Huruf kecil: <span id="Lower">0</span>

    </p>

    <button onclick="toUpper()">Besarkan</button>
    <button onclick="toLower()">Kecilkan</button>

    <br><br>

    <label>Hasil:</label><br>
    <textarea id="editor-kecil"></textarea>

    <script src="index.js"></script>
</div>

</body>
</html>
